spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_trainingsplan}
spring.datasource.username=${DB_USERNAME:smart_trainingsplan}
spring.datasource.password=${DB_PASSWORD:smart_trainingsplan}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:4200}

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost/api/strava/callback}
strava.frontend-url=${STRAVA_FRONTEND_URL:http://localhost}
