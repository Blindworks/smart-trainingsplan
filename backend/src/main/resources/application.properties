spring.datasource.url=jdbc:mariadb://localhost:3306/smart_trainingsplan
spring.datasource.username=smart_trainingsplan
spring.datasource.password=taxcRH51#
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# CORS configuration
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Jackson configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Strava OAuth
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/strava/callback}
strava.frontend-url=${STRAVA_FRONTEND_URL:http://localhost:4200}