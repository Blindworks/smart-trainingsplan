services:
  backend:
    build:
      context: ./backend
    container_name: pacr-backend
    environment:
      SPRING_PROFILES_ACTIVE: test
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: pacr
      DB_USERNAME: pacr
      DB_PASSWORD: ${DB_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:4200,http://localhost:4201,http://192.168.1.100:4201
      STRAVA_REDIRECT_URI: http://localhost/api/strava/callback
      STRAVA_FRONTEND_URL: http://localhost
      UPLOAD_PATH: /app/uploads
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
    ports:
      - "8081:8080"

    volumes:
      - user_uploads:/app/uploads

    networks:
      - mariadb_default
      - app_net2

  frontend:
    build:
      context: ./angular-frontend
    container_name: pacr-frontend
    ports:
      - "4201:80"
    depends_on:
      - backend
    networks:
      - app_net2

networks:
  app_net2:
    driver: bridge

  mariadb_default:
      external: true

volumes:
  user_uploads:
