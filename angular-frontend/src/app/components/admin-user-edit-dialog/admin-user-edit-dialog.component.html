<h2 mat-dialog-title>User bearbeiten</h2>

<mat-dialog-content class="dialog-content">
  <form class="form-grid" [formGroup]="form">
    <mat-form-field appearance="outline" class="field">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>E-Mail</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Vorname</mat-label>
      <input matInput formControlName="firstName" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Nachname</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        @for (status of statusOptions; track status.value) {
          <mat-option [value]="status.value">{{ status.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="actions">
  <button mat-button type="button" (click)="onCancel()" [disabled]="saving">Abbrechen</button>
  <button mat-flat-button color="primary" type="button" class="save-button" (click)="onSave()" [disabled]="form.invalid || saving">
    @if (saving) {
      <mat-spinner diameter="16"></mat-spinner>
      <span>Speichern...</span>
    } @else {
      Speichern
    }
  </button>
</mat-dialog-actions>
