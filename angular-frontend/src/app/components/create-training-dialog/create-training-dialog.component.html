<div class="dialog-container">
  <div class="dialog-header">
    <div class="header-title">
      <mat-icon>add_circle</mat-icon>
      <span>Training erstellen</span>
    </div>
    <div class="header-date">{{ formatDate(data.date) }}</div>
    <button mat-icon-button class="close-btn" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" class="dialog-form" (ngSubmit)="onSave()">
    <div class="form-body">

      <!-- Name -->
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" placeholder="z.B. Langer Dauerlauf" autocomplete="off">
        <mat-error *ngIf="form.get('name')?.hasError('required')">Name ist erforderlich</mat-error>
      </mat-form-field>

      <!-- Type & Intensity row -->
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Trainingsart</mat-label>
          <mat-select formControlName="trainingType">
            <mat-option *ngFor="let t of trainingTypes" [value]="t.value">{{ t.label }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Intensität</mat-label>
          <mat-select formControlName="intensityLevel">
            <mat-option *ngFor="let i of intensityLevels" [value]="i.value">{{ i.label }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <!-- Duration -->
      <mat-form-field appearance="outline">
        <mat-label>Dauer (Min)</mat-label>
        <input matInput type="number" formControlName="durationMinutes" placeholder="60" min="1" max="999">
        <mat-hint>Optional</mat-hint>
        <mat-error *ngIf="form.get('durationMinutes')?.hasError('min')">Mind. 1 Minute</mat-error>
      </mat-form-field>

      <!-- Description -->
      <mat-form-field appearance="outline">
        <mat-label>Beschreibung</mat-label>
        <textarea matInput formControlName="description" rows="3" placeholder="Optionale Notizen zum Training"></textarea>
        <mat-hint>Optional</mat-hint>
      </mat-form-field>

    </div>

    <div class="dialog-actions">
      <button mat-button type="button" (click)="onCancel()">Abbrechen</button>
      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="form.invalid || saving">
        <mat-icon>save</mat-icon>
        {{ saving ? 'Wird gespeichert...' : 'Speichern' }}
      </button>
    </div>
  </form>
</div>
