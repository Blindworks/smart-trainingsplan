<article class="score-ring-card" [class]="'score-ring-card state-' + state">
  <header class="card-header">
    <div class="header-row">
      <div>
        <p class="label">{{ label }}</p>
        <p class="subtitle">{{ subtitle }}</p>
      </div>
      <button class="info-btn" type="button" *ngIf="infoText" (click)="toggleInfo()">
        {{ 'dashboard.whatDoesItMean' | t }}
      </button>
    </div>
    <p class="info-text" *ngIf="infoText && infoOpen">{{ infoText }}</p>
  </header>

  <div class="ring-wrap" aria-hidden="true">
    <svg class="ring" viewBox="0 0 128 128" role="presentation">
      <circle class="ring-track" cx="64" cy="64" [attr.r]="radius"></circle>
      <circle
        class="ring-progress"
        cx="64"
        cy="64"
        [attr.r]="radius"
        [attr.stroke-dasharray]="circumference"
        [attr.stroke-dashoffset]="dashOffset"
      ></circle>
    </svg>

    <div class="ring-value">
      <span class="number">{{ valueDisplay }}</span>
      <span class="max">/ {{ max }}</span>
    </div>
  </div>

  <p class="footer" *ngIf="footerText">{{ footerText }}</p>
</article>
