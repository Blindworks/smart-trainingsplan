<nav class="pacr-nav">
  <div class="nav-inner">
    <!-- Brand -->
    <a class="nav-brand" routerLink="/">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L18 7V13L10 18L2 13V7L10 2Z" stroke="url(#g)" stroke-width="1.5" fill="none"/>
          <path d="M10 6L14 8.5V11.5L10 14L6 11.5V8.5L10 6Z" fill="url(#g)" opacity="0.6"/>
          <defs>
            <linearGradient id="g" x1="2" y1="2" x2="18" y2="18" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00E5FF"/>
              <stop offset="50%" stop-color="#2D7BFF"/>
              <stop offset="100%" stop-color="#7A5CFF"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="brand-name">PACR</span>
    </a>

    <!-- Navigation Links -->
    <div class="nav-links">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-link" routerLink="/competitions" routerLinkActive="active">
        <mat-icon>emoji_events</mat-icon>
        <span>Races</span>
      </a>
      <a class="nav-link" routerLink="/plans" routerLinkActive="active">
        <mat-icon>library_books</mat-icon>
        <span>Pläne</span>
      </a>
      <a class="nav-link" routerLink="/overview" routerLinkActive="active">
        <mat-icon>grid_view</mat-icon>
        <span>Training</span>
      </a>
      <a class="nav-link" routerLink="/completion" routerLinkActive="active">
        <mat-icon>monitoring</mat-icon>
        <span>Log</span>
      </a>
      <a class="nav-link" routerLink="/body-status" routerLinkActive="active">
        <mat-icon>monitor_heart</mat-icon>
        <span>Body</span>
      </a>
      <a class="nav-link" routerLink="/body-measurements" routerLinkActive="active">
        <mat-icon>scale</mat-icon>
        <span>Körperdaten</span>
      </a>
      @if (isAdmin()) {
        <a class="nav-link" routerLink="/admin" routerLinkActive="active">
          <mat-icon>admin_panel_settings</mat-icon>
          <span>Admin</span>
        </a>
      }
    </div>

    <!-- Profile Link -->
    <a class="nav-link nav-profile" routerLink="/profile" routerLinkActive="active">
      <mat-icon>account_circle</mat-icon>
    </a>

    <!-- Logout Button -->
    @if (isLoggedIn()) {
      <button mat-icon-button class="nav-logout" (click)="logout()" title="Abmelden">
        <mat-icon>logout</mat-icon>
      </button>
    }
  </div>
</nav>
