<div class="converter-dialog">
  <div class="dialog-header">
    <h2 mat-dialog-title>Pace Rechner</h2>
    <button mat-icon-button (click)="close()" aria-label="Schliessen">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div mat-dialog-content class="dialog-content">
    <p class="hint">Live-Rechner: Eingabe in einem Feld aktualisiert die anderen Werte sofort.</p>

    <div class="grid">
      <div class="field-with-slider">
        <mat-form-field appearance="outline">
          <mat-label>Distanz (km)</mat-label>
          <input matInput type="number" min="0" step="0.01" [(ngModel)]="distanceKm" (ngModelChange)="onDistanceChange()">
        </mat-form-field>
        <div class="slider-field">
          <mat-slider min="0.1" max="100" step="0.1">
            <input
              matSliderThumb
              [ngModel]="distanceSliderKm"
              (ngModelChange)="onDistanceSliderChange($event)">
          </mat-slider>
        </div>
      </div>

      <div class="time-group">
        <mat-form-field appearance="outline">
          <mat-label>Zeit (h)</mat-label>
          <input matInput type="number" min="0" [(ngModel)]="timeHours" (ngModelChange)="onTimeChange()">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Zeit (min)</mat-label>
          <input matInput type="number" min="0" [(ngModel)]="timeMinutes" (ngModelChange)="onTimeChange()">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Zeit (s)</mat-label>
          <input matInput type="number" min="0" [(ngModel)]="timeSeconds" (ngModelChange)="onTimeChange()">
        </mat-form-field>
      </div>

      <div class="pace-group">
        <div class="pace-field">
          <label class="pace-label">Pace (MM:ss / km)</label>
          <app-pace-input [(ngModel)]="paceInput" (ngModelChange)="onPaceInputChanged($event)" placeholder="z.B. 04:30" />
        </div>
        <div class="slider-field">
          <mat-slider min="120" max="720" step="1">
            <input
              matSliderThumb
              [ngModel]="paceSliderSeconds"
              (ngModelChange)="onPaceSliderChange($event)">
          </mat-slider>
        </div>
      </div>

      <div class="field-with-slider">
        <mat-form-field appearance="outline">
          <mat-label>Geschwindigkeit (km/h)</mat-label>
          <input matInput type="number" min="0" step="0.01" [(ngModel)]="speedKmh" (ngModelChange)="onSpeedChange()">
        </mat-form-field>
        <div class="slider-field">
          <mat-slider min="1" max="30" step="0.1">
            <input
              matSliderThumb
              [ngModel]="speedSliderKmh"
              (ngModelChange)="onSpeedSliderChange($event)">
          </mat-slider>
        </div>
      </div>
    </div>

    @if (errorMessage) {
      <div class="error-box">{{ errorMessage }}</div>
    }

  </div>

  <div mat-dialog-actions class="dialog-actions">
    <button mat-raised-button color="primary" (click)="close()">Schliessen</button>
  </div>
</div>
