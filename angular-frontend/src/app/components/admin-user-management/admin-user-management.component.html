<section class="admin-users-page">
  <div class="page-head">
    <a mat-stroked-button routerLink="/admin">
      <mat-icon>arrow_back</mat-icon>
      Zurück zu Admin
    </a>
    <h1>Usersverwaltung</h1>
  </div>

  <mat-card class="admin-users-card">
    @if (loading) {
      <div class="loading-wrap">
        <mat-spinner diameter="36"></mat-spinner>
      </div>
    } @else if (users.length === 0) {
      <p class="empty-state">Keine Nutzer gefunden.</p>
    } @else {
      <div class="user-table">
        <div class="row row-head">
          <span>ID</span>
          <span>Username</span>
          <span>E-Mail</span>
          <span>Rolle</span>
        </div>
        @for (user of users; track user.id ?? user.username) {
          <div class="row">
            <span>{{ user.id ?? '-' }}</span>
            <span>{{ user.username }}</span>
            <span>{{ user.email }}</span>
            <span>{{ user.role ?? 'USER' }}</span>
          </div>
        }
      </div>
    }
  </mat-card>
</section>
