<div class="library-page">

  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-title-group">
        <span class="page-label">TRAININGSPLÄNE</span>
        <h1 class="page-title">Plan-Bibliothek</h1>
      </div>
      <a class="pacr-btn-primary" mat-raised-button routerLink="/competitions/new">
        <mat-icon>upload_file</mat-icon>
        Plan hochladen
      </a>
    </div>
  </div>

  <div class="library-loading" *ngIf="templatesLoading">
    <mat-spinner diameter="36"></mat-spinner>
    <span>Pläne laden...</span>
  </div>

  <div class="library-grid" *ngIf="!templatesLoading && templatePlans.length > 0">
    <div class="plan-card" *ngFor="let plan of templatePlans">
      <div class="plan-card__body">
        <div class="plan-card__icon">
          <mat-icon>route</mat-icon>
        </div>
        <div class="plan-card__info">
          <span class="plan-card__name">{{ plan.name }}</span>
          <span class="plan-card__description" *ngIf="plan.description">{{ plan.description }}</span>
          <span class="plan-card__meta" *ngIf="plan.trainingCount != null">
            {{ plan.trainingCount }} Trainings
          </span>
        </div>
      </div>
      <button class="plan-card__assign" mat-stroked-button (click)="openAssignDialog(plan)">
        <mat-icon>assignment</mat-icon>
        Zuweisen
      </button>
    </div>
  </div>

  <div class="empty-state" *ngIf="!templatesLoading && templatePlans.length === 0">
    <div class="empty-icon">
      <mat-icon>library_books</mat-icon>
    </div>
    <h2>Keine Pläne vorhanden</h2>
    <p>Lade einen Trainingsplan hoch, um ihn deinen Wettkämpfen zuzuweisen.</p>
    <a class="pacr-btn-primary" mat-raised-button routerLink="/competitions/new">
      <mat-icon>upload_file</mat-icon>
      Plan hochladen
    </a>
  </div>

</div>
